<!DOCTYPE html>
<html>
<head>
<title>Task Manager</title>
<style>
body{
font-family: Arial;
margin:40px;
}
input{
display:block;
margin:10px 0;
padding:8px;
}
button{
padding:8px 15px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>Register</h2>

<input id="regName" placeholder="Name">
<input id="regEmail" placeholder="Email">
<input id="regPassword" placeholder="Password">

<button onclick="register()">Register</button>


<h2>Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" placeholder="Password">

<button onclick="login()">Login</button>


<h2>Create Task</h2>

<input id="taskTitle" placeholder="Task Title">
<input id="taskDesc" placeholder="Task Description">

<button onclick="createTask()">Create Task</button>


<h2>Your Tasks</h2>

<button onclick="getTasks()">Load Tasks</button>

<ul id="taskList"></ul>


<script>

let token = "";


async function register(){

const name = document.getElementById("regName").value
const email = document.getElementById("regEmail").value
const password = document.getElementById("regPassword").value

const res = await fetch("http://localhost:3000/api/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,email,password
})

})

const data = await res.json()

if(res.ok){
alert("User Registered")
} else {
alert("Error: " + (data.message || data.error || "Unknown error"))
}

}



async function login(){

const email = document.getElementById("loginEmail").value
const password = document.getElementById("loginPassword").value

const res = await fetch("http://localhost:3000/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,password
})

})

const data = await res.json()

if(res.ok){
token = data.token
alert("Login Successful")
getTasks(); // Auto-load tasks after login
} else {
alert("Error: " + (data.message || data.error || "Unknown error"))
}

}



async function createTask(){

if(!token){
alert("Please login first")
return
}

const title = document.getElementById("taskTitle").value
const description = document.getElementById("taskDesc").value

const res = await fetch("http://localhost:3000/api/tasks",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({
title,description
})

})

const data = await res.json()

if(res.ok){
alert("Task Created")
getTasks(); // Reload tasks after creating
} else {
alert("Error: " + (data.message || data.error || "Unknown error"))
}

}



async function getTasks(){

if(!token){
alert("Please login first")
return
}

const res = await fetch("http://localhost:3000/api/tasks",{

headers:{
"Authorization":"Bearer "+token
}

})

const tasks = await res.json()

if(res.ok){
const list = document.getElementById("taskList")

list.innerHTML=""

tasks.forEach(task=>{

const li = document.createElement("li")

li.innerText = task.title + " - " + task.description

list.appendChild(li)

})
} else {
alert("Error: " + (tasks.message || tasks.error || "Unknown error"))
}

}

</script>

</body>
</html>
